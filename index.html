<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>כל התורה כולה</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@300;400;500;600;700&family=Frank+Ruhl+Libre:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  body {
    font-family: 'Assistant', sans-serif;
    background: #f8fafc;
  }
.hebrew-title {
    font-family: 'Frank Ruhl Libre', serif;
  }
  details > summary {
    list-style: none;
  }
  details > summary::-webkit-details-marker {
    display: none;
  }
.chevron {
    transition: transform 0.3s ease;
  }
  details[open].chevron {
    transform: rotate(180deg);
  }
</style>
</head>
<body class="min-h-screen text-slate-800">
  <div class="sticky top-0 z-50 bg-[#f8fafc] border-b border-slate-200">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
      <div class="flex items-center justify-between mb-3">
        <span id="progressText" class="text-sm font-medium text-indigo-600">0%</span>
        <h1 class="text-2xl sm:text-3xl font-bold hebrew-title text-slate-900">כל התורה כולה</h1>
      </div>
      <div class="space-y-2">
        <div class="flex items-center justify-end text-sm font-medium text-slate-600">
          <span id="progressCount">Completed 0 of 210 (0%)</span>
        </div>
        <div class="w-full bg-slate-200 rounded-full h-2.5 overflow-hidden">
          <div id="progressBar" class="bg-indigo-500 h-full rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
      </div>
    </div>
  </div>

  <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
    <div id="checklistContainer" class="space-y-3"></div>
  </main>

  <script>
    const CHECKLIST_DATA = [
      {
        title: 'תנ"ך',
        subtitle: '24 ספרים',
        items: [
          { group: 'תורה', items: ['בראשית', 'שמות', 'ויקרא', 'במדבר', 'דברים'] },
          { group: 'נביאים ראשונים', items: ['יהושע', 'שופטים', 'שמואל', 'מלכים'] },
          { group: 'נביאים אחרונים', items: ['ישעיה', 'ירמיה', 'יחזקאל', 'תרי עשר'] },
          { group: 'כתובים', items: ['תהלים', 'משלי', 'איוב', 'שיר השירים', 'רות', 'איכה', 'קהלת', 'אסתר', 'דניאל', 'עזרא-נחמיה', 'דברי הימים'] }
        ]
      },
      {
        title: 'משנה',
        subtitle: '63 מסכתות',
        items: [
          { group: 'זרעים', items: ['ברכות', 'פאה', 'דמאי', 'כלאים', 'שביעית', 'תרומות', 'מעשרות', 'מעשר שני', 'חלה', 'ערלה', 'ביכורים'] },
          { group: 'מועד', items: ['שבת', 'עירובין', 'פסחים', 'שקלים', 'יומא', 'סוכה', 'ביצה', 'ראש השנה', 'תענית', 'מגילה', 'מועד קטן', 'חגיגה'] },
          { group: 'נשים', items: ['יבמות', 'כתובות', 'נדרים', 'נזיר', 'סוטה', 'גיטין', 'קידושין'] },
          { group: 'נזיקין', items: ['בבא קמא', 'בבא מציעא', 'בבא בתרא', 'סנהדרין', 'מכות', 'שבועות', 'עדיות', 'עבודה זרה', 'אבות', 'הוריות'] },
          { group: 'קדשים', items: ['זבחים', 'מנחות', 'חולין', 'בכורות', 'ערכין', 'תמורה', 'כריתות', 'מעילה', 'תמיד', 'מדות', 'קנים'] },
          { group: 'טהרות', items: ['כלים', 'אהלות', 'נגעים', 'פרה', 'טהרות', 'מקואות', 'נדה', 'מכשירין', 'זבים', 'טבול יום', 'ידים', 'עוקצין'] }
        ]
      },
      {
        title: 'תלמוד בבלי',
        subtitle: '37 מסכתות',
        items: [
          { group: 'סדר זרעים', items: ['ברכות'] },
          { group: 'סדר מועד', items: ['שבת', 'עירובין', 'פסחים', 'ראש השנה', 'יומא', 'סוכה', 'ביצה', 'תענית', 'מגילה', 'מועד קטן', 'חגיגה'] },
          { group: 'סדר נשים', items: ['יבמות', 'כתובות', 'נדרים', 'נזיר', 'סוטה', 'גיטין', 'קידושין'] },
          { group: 'סדר נזיקין', items: ['בבא קמא', 'בבא מציעא', 'בבא בתרא', 'סנהדרין', 'מכות', 'שבועות', 'עבודה זרה', 'הוריות'] },
          { group: 'סדר קדשים', items: ['זבחים', 'מנחות', 'חולין', 'בכורות', 'ערכין', 'תמורה', 'כריתות', 'מעילה', 'תמיד'] },
          { group: 'סדר טהרות', items: ['נדה'] }
        ]
      },
      {
        title: 'תלמוד ירושלמי',
        subtitle: '39 מסכתות',
        items: [
          { group: 'סדר זרעים', items: ['ברכות', 'פאה', 'דמאי', 'כלאים', 'שביעית', 'תרומות', 'מעשרות', 'מעשר שני', 'חלה', 'ערלה', 'ביכורים'] },
          { group: 'סדר מועד', items: ['שבת', 'עירובין', 'פסחים', 'יומא', 'סוכה', 'ביצה', 'ראש השנה', 'תענית', 'מגילה', 'מועד קטן', 'חגיגה'] },
          { group: 'סדר נשים', items: ['יבמות', 'כתובות', 'נדרים', 'נזיר', 'סוטה', 'גיטין', 'קידושין'] },
          { group: 'סדר נזיקין', items: ['בבא קמא', 'בבא מציעא', 'בבא בתרא', 'סנהדרין', 'מכות', 'שבועות', 'עבודה זרה', 'הוריות'] },
          { group: 'סדר טהרות', items: ['נדה'] }
        ]
      },
      {
        title: 'מדרשי הלכה',
        subtitle: '',
        items: [
          { group: '', items: ['תוספתא', 'ספרא', 'ספרי במדבר', 'ספרי דברים', 'מכילתא דרבי ישמעאל'] }
        ]
      },
      {
        title: 'מדרשי אגדה',
        subtitle: '18 ספרים',
        items: [
          { group: '', items: ['בראשית רבה', 'שמות רבה', 'ויקרא רבה', 'במדבר רבה', 'דברים רבה', 'שיר השירים רבה', 'רות רבה', 'איכה רבה', 'קהלת רבה', 'אסתר רבה', 'מדרש תנחומא', 'פסיקתא דרב כהנא', 'פסיקתא רבתי', 'פרקי דרבי אליעזר', 'תנא דבי אליהו', 'מדרש תהלים', 'ילקוט שמעוני', 'סדר עולם רבה'] }
        ]
      },
      {
        title: 'זוהר',
        subtitle: '',
        items: [
          { group: '', items: ['זהר', 'זהר חדש', 'תיקוני זהר'] }
        ]
      },
      {
        title: 'רמב"ם - משנה תורה',
        subtitle: '14 ספרים',
        items: [
          { group: '', items: ['ספר המדע', 'ספר אהבה', 'ספר זמנים', 'ספר נשים', 'ספר קדושה', 'ספר הפלאה', 'ספר זרעים', 'ספר עבודה', 'ספר קרבנות', 'ספר טהרה', 'ספר נזקים', 'ספר קנין', 'ספר משפטים', 'ספר שופטים'] }
        ]
      },
      {
        title: 'טור',
        subtitle: '4 חלקים',
        items: [
          { group: '', items: ['אורח חיים', 'יורה דעה', 'אבן העזר', 'חושן משפט'] }
        ]
      },
      {
        title: 'שולחן ערוך',
        subtitle: '4 חלקים',
        items: [
          { group: '', items: ['אורח חיים', 'יורה דעה', 'אבן העזר', 'חושן משפט'] }
        ]
      }
    ];

    const STORAGE_KEY = 'kolHaTorahKulah-v7';
    let state = {};

    function slugify(text) {
      return text.replace(/\s+/g, '-').replace(/[^\u0590-\u05FF\w\-]/g, '');
    }

    function loadState() {
      try {
        state = JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}');
      } catch (e) {
        state = {};
      }
    }

    function saveState() {
      try {
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      } catch (e) {
        console.error('Failed to save state:', e);
      }
    }

    function createSection(section, sectionIndex) {
      let sectionItems = 0;
      let sectionChecked = 0;
      
      const itemsHtml = section.items.map((group, groupIndex) => {
        const groupItemsHtml = group.items.map((item, itemIndex) => {
          const itemId = `item-${sectionIndex}-${groupIndex}-${itemIndex}`;
          const checked = state[itemId] || false;
          sectionItems++;
          if (checked) sectionChecked++;
          
          return `
            <div class="flex items-center gap-3 px-4 py-2.5 hover:bg-slate-50">
              <input 
                type="checkbox" 
                id="${itemId}" 
                data-id="${itemId}"
                class="w-4 h-4 text-indigo-600 rounded border-slate-300 focus:ring-2 focus:ring-indigo-500 cursor-pointer flex-shrink-0"
                ${checked? 'checked' : ''}
              >
              <label for="${itemId}" class="flex-1 cursor-pointer text-slate-700 hebrew-title text-sm select-none">
                ${item}
              </label>
            </div>
          `;
        }).join('');
        
        if (group.group) {
          return `
            <div class="mb-3">
              <h4 class="text-xs font-semibold text-slate-500 uppercase tracking-wide px-4 mb-1.5 hebrew-title">${group.group}</h4>
              <div class="space-y-0.5">${groupItemsHtml}</div>
            </div>
          `;
        }
        return `<div class="space-y-0.5">${groupItemsHtml}</div>`;
      }).join('');
      
      const percent = sectionItems > 0? Math.round((sectionChecked / sectionItems) * 100) : 0;
      
      return `
        <details class="bg-white rounded-lg border border-slate-200">
          <summary class="px-4 py-3.5 cursor-pointer select-none">
            <div class="flex items-center gap-4">
              <div class="flex items-center gap-3">
                <svg class="chevron w-4 h-4 text-slate-400 flex-shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"></path>
                </svg>
                <span class="text-sm font-medium text-slate-600">${sectionChecked}/${sectionItems}</span>
              </div>
              <div class="flex-1 mx-4">
                <div class="w-full bg-slate-200 rounded-full h-1.5 overflow-hidden">
                  <div class="bg-indigo-400 h-full rounded-full transition-all duration-300" style="width: ${percent}%"></div>
                </div>
              </div>
              <div class="flex items-center gap-2">
                ${section.subtitle? `<span class="text-xs text-slate-500">${section.subtitle}</span>` : ''}
                <h3 class="text-base font-semibold hebrew-title text-slate-900">${section.title}</h3>
              </div>
            </div>
          </summary>
          <div class="border-t border-slate-200 bg-white px-2 py-3">
            ${itemsHtml}
          </div>
        </details>
      `;
    }

    function renderChecklist() {
      const html = CHECKLIST_DATA.map((section, idx) => createSection(section, idx)).join('');
      document.getElementById('checklistContainer').innerHTML = html;
      updateProgress();
      attachCheckboxListeners();
    }

    function updateProgress() {
      const checkboxes = document.querySelectorAll('input[type="checkbox"][data-id]');
      const checked = Array.from(checkboxes).filter(cb => cb.checked).length;
      const total = checkboxes.length;
      const percent = total > 0? Math.round((checked / total) * 100) : 0;
      
      document.getElementById('progressText').textContent = `${percent}%`;
      document.getElementById('progressCount').textContent = `Completed ${checked} of ${total} (${percent}%)`;
      document.getElementById('progressBar').style.width = `${percent}%`;
      
      renderChecklist();
    }

    function attachCheckboxListeners() {
      document.querySelectorAll('input[type="checkbox"][data-id]').forEach(checkbox => {
        checkbox.addEventListener('change', (e) => {
          const id = e.target.getAttribute('data-id');
          state[id] = e.target.checked;
          saveState();
          updateProgress();
        });
      });
    }

    loadState();
    renderChecklist();
  </script>
</body>
</html>
