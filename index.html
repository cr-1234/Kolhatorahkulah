<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>כל התורה כולה</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Assistant:wght@400;500;600&family=Frank+Ruhl+Libre:wght@500;700&display=swap" rel="stylesheet">
<style>
  html,body{direction:rtl;background:#f8fafc;font-family:'Assistant',sans-serif}
.heb{font-family:'Frank Ruhl Libre',serif}
  details>summary{list-style:none}
  details>summary::-webkit-details-marker{display:none}
</style>
</head>
<body class="text-slate-800">
  <!-- HEADER -->
  <div class="sticky top-0 z-40 bg-[#f8fafc] border-b border-slate-200">
    <div class="max-w-5xl mx-auto px-4 py-3">
      <h1 class="heb text-[26px] font-bold text-slate-900 text-right w-full mb-2">כל התורה כולה</h1>
      <div class="flex justify-between items-center text-[13px] mb-2">
        <span id="count" class="text-slate-600">Completed 0 of 210 (0%)</span>
        <span id="pct" class="font-medium text-indigo-500">0%</span>
      </div>
      <div class="w-full h-2 bg-[#e6eaf2] rounded-full overflow-hidden">
        <div id="bar" class="h-full bg-[#c7d2fe] w-0 transition-all"></div>
      </div>
    </div>
  </div>

  <main class="max-w-5xl mx-auto px-4 py-5">
    <div id="list" class="space-y-3"></div>
  </main>

<script>
const DATA=[
 ["תנ\"ך","24 ספרים",["בראשית","שמות","ויקרא","במדבר","דברים","יהושע","שופטים","שמואל","מלכים","ישעיה","ירמיה","יחזקאל","תרי עשר","תהלים","משלי","איוב","שיר השירים","רות","איכה","קהלת","אסתר","דניאל","עזרא-נחמיה","דברי הימים"]],
 ["משנה","63 מסכתות",["ברכות","פאה","דמאי","כלאים","שביעית","תרומות","מעשרות","מעשר שני","חלה","ערלה","ביכורים","שבת","עירובין","פסחים","שקלים","יומא","סוכה","ביצה","ראש השנה","תענית","מגילה","מועד קטן","חגיגה","יבמות","כתובות","נדרים","נזיר","סוטה","גיטין","קידושין","בבא קמא","בבא מציעא","בבא בתרא","סנהדרין","מכות","שבועות","עדיות","עבודה זרה","אבות","הוריות","זבחים","מנחות","חולין","בכורות","ערכין","תמורה","כריתות","מעילה","תמיד","מדות","קנים","כלים","אהלות","נגעים","פרה","טהרות","מקואות","נדה","מכשירין","זבים","טבול יום","ידים","עוקצין"]],
 ["תלמוד בבלי","37 מסכתות",["ברכות","שבת","עירובין","פסחים","ראש השנה","יומא","סוכה","ביצה","תענית","מגילה","מועד קטן","חגיגה","יבמות","כתובות","נדרים","נזיר","סוטה","גיטין","קידושין","בבא קמא","בבא מציעא","בבא בתרא","סנהדרין","מכות","שבועות","עבודה זרה","הוריות","זבחים","מנחות","חולין","בכורות","ערכין","תמורה","כריתות","מעילה","תמיד","נדה"]],
 ["תלמוד ירושלמי","39 מסכתות",["ברכות","פאה","דמאי","כלאים","שביעית","תרומות","מעשרות","מעשר שני","חלה","ערלה","ביכורים","שבת","עירובין","פסחים","יומא","סוכה","ביצה","ראש השנה","תענית","מגילה","מועד קטן","חגיגה","יבמות","כתובות","נדרים","נזיר","סוטה","גיטין","קידושין","בבא קמא","בבא מציעא","בבא בתרא","סנהדרין","מכות","שבועות","עבודה זרה","הוריות","נדה"]],
 ["מדרשי הלכה","",["תוספתא","ספרא","ספרי במדבר","ספרי דברים","מכילתא דרבי ישמעאל"]],
 ["מדרשי אגדה","18 ספרים",["בראשית רבה","שמות רבה","ויקרא רבה","במדבר רבה","דברים רבה","שיר השירים רבה","רות רבה","איכה רבה","קהלת רבה","אסתר רבה","מדרש תנחומא","פסיקתא דרב כהנא","פסיקתא רבתי","פרקי דרבי אליעזר","תנא דבי אליהו","מדרש תהלים","ילקוט שמעוני","סדר עולם רבה"]],
 ["זוהר","",["זהר","זהר חדש","תיקוני זהר"]],
 ["רמב\"ם","14 ספרים",["המדע","אהבה","זמנים","נשים","קדושה","הפלאה","זרעים","עבודה","קרבנות","טהרה","נזקים","קנין","משפטים","שופטים"]],
 ["טור","4 חלקים",["אורח חיים","יורה דעה","אבן העזר","חושן משפט"]],
 ["שולחן ערוך","4 חלקים",["אורח חיים","יורה דעה","אבן העזר","חושן משפט"]]
];

const KEY='kol-torah-final'; let STATE=JSON.parse(localStorage.getItem(KEY)||'{}');
const save=()=>localStorage.setItem(KEY,JSON.stringify(STATE));

function render(){
  // remember open sections
  const openIdx = [...document.querySelectorAll('#list details')].map((d,i)=>d.open?i:-1).filter(i=>i>=0);

  let total=0, done=0;
  const html = DATA.map(([title,sub,items],i)=>{
    let sc=0;
    const list = items.map((name,j)=>{
      const id=i+'-'+j; total++; if(STATE[id]){done++; sc++;}
      // SPAN first = far-right edge, INPUT second = immediately left of it
      return `<label class="flex items-center justify-start gap-3 px-5 py-2.5 hover:bg-slate-50 cursor-pointer border-b border-slate-100 last:border-0">
        <span class="heb text-[15px] text-slate-800 text-right">${name}</span>
        <input type="checkbox" data-id="${id}" ${STATE[id]?'checked':''} class="w-4 h-4 accent-indigo-500">
      </label>`;
    }).join('');
    const pct = items.length? Math.round(sc/items.length*100) : 0;
    return `<details data-idx="${i}" class="bg-white rounded-xl border border-slate-200 shadow-sm overflow-hidden">
      <summary class="px-5 py-4 cursor-pointer select-none">
        <div class="flex justify-between items-start mb-3">
          <div class="text-right">
            <div class="flex items-baseline gap-2 justify-end">
              <span class="heb font-semibold text-slate-900 text-[16px]">${title}</span>
              ${sub?`<span class="text-[12px] text-slate-500">${sub}</span>`:''}
            </div>
          </div>
          <svg class="w-4 h-4 text-slate-400 mt-1 shrink-0" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" d="M19 9l-7 7-7"/></svg>
        </div>
        <div class="flex items-center gap-3">
          <div class="flex-1 h-[6px] bg-[#e6eaf2] rounded-full overflow-hidden">
            <div class="h-full bg-[#dbe2f1] transition-all" style="width:${pct}%"></div>
          </div>
          <span class="text-[12px] text-slate-600 w-[38px] text-left">${sc}/${items.length}</span>
        </div>
      </summary>
      <div class="border-t border-slate-200 bg-white">${list}</div>
    </details>`;
  }).join('');

  document.getElementById('list').innerHTML = html;
  // restore open sections
  document.querySelectorAll('#list details').forEach((d,i)=>{ if(openIdx.includes(i)) d.open = true; });

  const p = total? Math.round(done/total*100) : 0;
  document.getElementById('pct').textContent = p+'%';
  document.getElementById('count').textContent = `Completed ${done} of ${total} (${p}%)`;
  document.getElementById('bar').style.width = p+'%';

  document.querySelectorAll('input[type=checkbox]').forEach(cb=>{
    cb.onchange = e => { STATE[e.target.dataset.id] = e.target.checked; save(); render(); };
  });
}
render();
</script>
</body>
</html>
